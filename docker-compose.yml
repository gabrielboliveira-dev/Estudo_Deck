version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: estudodeck-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=sua_senha
      - POSTGRES_DB=estudodeck
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
